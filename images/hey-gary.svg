<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="curtain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="400" fill="url(#spotlight)"/>
  
  <!-- 幕布 -->
  <path d="M0 0 L80 0 L60 400 L0 400 Z" fill="url(#curtain)"/>
  <path d="M600 0 L520 0 L540 400 L600 400 Z" fill="url(#curtain)"/>
  
  <!-- 舞台灯光效果 -->
  <ellipse cx="300" cy="200" rx="180" ry="120" fill="#3a3a3a"/>
  
  <!-- Ubuntu Logo 左上 -->
  <g transform="translate(80, 60)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#E95420" stroke-width="3"/>
    <circle cx="30" cy="30" r="10" fill="#E95420"/>
    <circle cx="30" cy="10" r="4" fill="#E95420">
      <animate attributeName="cy" values="10;8;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="30" r="4" fill="#E95420">
      <animate attributeName="cx" values="10;12;10" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="30" r="4" fill="#E95420">
      <animate attributeName="cx" values="50;48;50" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="50" r="4" fill="#E95420">
      <animate attributeName="cy" values="50;52;50" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Ubuntu Logo 左下 -->
  <g transform="translate(60, 300)">
    <circle cx="30" cy="30" r="22" fill="none" stroke="#E95420" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="8" fill="#E95420"/>
  </g>
  
  <!-- FreeBSD Logo 右上 -->
  <g transform="translate(460, 60)">
    <circle cx="35" cy="35" r="28" fill="none" stroke="#666" stroke-width="3"/>
    <ellipse cx="35" cy="35" r="12" ry="14" fill="#666"/>
    <path d="M25 20 Q28 12 32 18" stroke="#666" stroke-width="3" fill="none"/>
    <path d="M45 20 Q42 12 38 18" stroke="#666" stroke-width="3" fill="none"/>
    <circle cx="30" cy="33" r="2" fill="white"/>
    <circle cx="40" cy="33" r="2" fill="white"/>
  </g>
  
  <!-- Debian Logo 右下 -->
  <g transform="translate(470, 300)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#A80030" stroke-width="3"/>
    <circle cx="30" cy="30" r="18" fill="none" stroke="#A80030" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="30" cy="30" r="8" fill="#A80030"/>
  </g>
  
  <!-- Gary 人物 -->
  <g transform="translate(300, 200)">
    <!-- 身体 -->
    <ellipse cx="0" cy="40" rx="35" ry="40" fill="#4a4a4a"/>
    <!-- 裤子 -->
    <rect x="-20" y="60" width="40" height="35" fill="#333"/>
    <!-- 腿 -->
    <rect x="-18" y="95" width="12" height="25" fill="#333"/>
    <rect x="6" y="95" width="12" height="25" fill="#333"/>
    
    <!-- 脖子 -->
    <rect x="-10" y="0" width="20" height="15" fill="#d4a574"/>
    
    <!-- 头 -->
    <ellipse cx="0" cy="-15" rx="30" ry="28" fill="#d4a574"/>
    <!-- 秃头 -->
    <ellipse cx="0" cy="-25" rx="22" ry="15" fill="#e8c49a"/>
    <!-- 耳朵 -->
    <ellipse cx="-30" cy="-10" rx="6" ry="10" fill="#d4a574"/>
    <ellipse cx="30" cy="-10" rx="6" ry="10" fill="#d4a574"/>
    <!-- 头发 -->
    <path d="M-25 -25 Q-20 -40 0 -42 Q20 -40 25 -25" stroke="#333" stroke-width="4" fill="none"/>
    
    <!-- 眼睛 -->
    <ellipse cx="-10" cy="-15" rx="6" ry="7" fill="white"/>
    <ellipse cx="10" cy="-15" rx="6" ry="7" fill="white"/>
    <circle cx="-10" cy="-14" r="4" fill="#222"/>
    <circle cx="10" cy="-14" r="4" fill="#222"/>
    <circle cx="-8" cy="-16" r="1.5" fill="white"/>
    <circle cx="12" cy="-16" r="1.5" fill="white"/>
    
    <!-- 微笑 -->
    <path d="M-15 5 Q0 18 15 5" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 鼻子 -->
    <ellipse cx="0" cy="-2" rx="4" ry="3" fill="#c9967c"/>
    
    <!-- 脸颊 -->
    <ellipse cx="-20" cy="0" rx="6" ry="4" fill="#e8a0a0" opacity="0.5"/>
    <ellipse cx="20" cy="0" rx="6" ry="4" fill="#e8a0a0" opacity="0.5"/>
    
    <!-- 手臂 -->
    <path d="M-30 30 Q-55 45 -50 70" stroke="#d4a574" stroke-width="12" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M-30 30 Q-55 45 -50 70;M-30 30 Q-60 40 -55 65;M-30 30 Q-55 45 -50 70" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M30 30 Q55 45 50 70" stroke="#d4a574" stroke-width="12" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M30 30 Q55 45 50 70;M30 30 Q60 40 55 65;M30 30 Q55 45 50 70" dur="0.8s" repeatCount="indefinite"/>
    </path>
    
    <!-- 手套 -->
    <circle cx="-50" cy="70" r="10" fill="white">
      <animate attributeName="cx" values="-50;-55;-50" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="70" r="10" fill="white">
      <animate attributeName="cx" values="50;55;50" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 文字 -->
  <text x="300" y="350" font-family="Georgia, serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">
    Hey guys, I'm Gary
  </text>
  <text x="300" y="380" font-family="Georgia, serif" font-size="22" fill="#E95420" text-anchor="middle" font-weight="bold">
    I love you all
    <animate attributeName="fill" values="#E95420;#A80030;#666;#E95420" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- 复古噪点效果 -->
  <rect width="600" height="400" filter="url(#grain)" opacity="0.15"/>
</svg>