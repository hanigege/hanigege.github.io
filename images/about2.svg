<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#ff6a00"/>
    <stop offset="25%" style="stop-color:#ffcc00"/>
    <stop offset="50%" style="stop-color:#00d4ff"/>
    <stop offset="75%" style="stop-color:#6c5ce7"/>
    <stop offset="100%" style="stop-color:#ff6ec7"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<rect width="100%" height="100%" fill="black"/>

<text x="450" y="100"
      font-size="44"
      font-family="Segoe UI, Arial, sans-serif"
      text-anchor="middle"
      fill="url(#grad1)"
      filter="url(#glow)">
  Hey guys, I'm Gary,
</text>

<text x="450" y="160"
      font-size="44"
      font-family="Segoe UI, Arial, sans-serif"
      text-anchor="middle"
      fill="url(#grad1)"
      filter="url(#glow)">
  I love you all.
</text>

</svg>